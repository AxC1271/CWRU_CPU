# Tiny Tapeout project information
project:
  title:        "CWRU CPU"      # Project title
  author:       "Andrew Chen, John Paul Magbitang"      # Your name
  discord:      "andr.ewww10, JP"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Runs Fibonacci sequence on RISC-V architecture"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     2       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_cwru_cpu"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "cwru_alu.v"
    - "cwru_control_unit.v"
    - "cwru_imm_gen.v"
    - "cwru_instr_mem.v"
    - "cwru_register_file.v"
    - "cwru_program_counter.v"
    - "project.v"

